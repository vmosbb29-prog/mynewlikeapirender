services:
  - type: web
    name: ff-premiumlike-api
    runtime: python
    rootDir: python-services/premiumlike
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
